name: bookia
description: "Bookia - Professional Booking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  connectivity_plus: ^7.1.0
  dartz: ^0.10.1
  device_preview: ^1.3.1
  dio: ^5.9.0
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.1
  freezed_annotation: ^3.1.0
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: ^16.2.2
  injectable: ^2.7.1+4
  json_annotation: ^4.11.0
  lottie: ^3.3.2
  shared_preferences: ^2.5.3
  skeletonizer: ^2.1.0+1
  smooth_page_indicator: ^1.2.1

dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.svg"
  min_sdk_android: 21
